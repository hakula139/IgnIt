{% extends "base.html" %}

{% block title %}<title>{{ term_name }} - {{ singular }} - {{ config.title }}</title>{% endblock %}

{% block body %}
  <div class="mx-auto max-w-4xl px-4 py-6">
    <div class="glass-panel p-6 sm:p-8">
      <h2 class="mb-6 text-xl font-semibold">
        {%- if singular == "tag" -%}
          <i class="fas fa-tag fa-fw" aria-hidden="true"></i> {{ term_name }}
        {%- else -%}
          {{ term_name }}
        {%- endif -%}
      </h2>

      {%- include "_partials/year-grouped-listing.html" %}
    </div>
  </div>
{%- endblock %}
