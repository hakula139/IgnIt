{# Desktop TOC sidebar (sticky, xl only) #}
{%- if toc %}
<aside class="toc-sidebar-wrapper">
  <div class="glass-glow sticky top-22">
    <div class="glass-panel toc-sidebar">
      <h2 class="toc-sidebar-title">Table of Contents</h2>
      <div class="toc-sidebar-scroll">
        {{ toc | safe }}
      </div>
    </div>
  </div>
</aside>
{%- endif %}
