{%- set cdn = config.params.cdn | default("https://cdn.jsdelivr.net/npm") -%}
{#- FontAwesome (when enabled in config) -#}
{%- if config.params.fontawesome | default(false) %}
  <link rel="stylesheet" href="{{ cdn }}/@fortawesome/fontawesome-free@6/css/all.min.css">
{%- endif %}
{#- KaTeX (when page has math: true) -#}
{%- if math | default(false) %}
  <link rel="stylesheet" href="{{ cdn }}/katex@0.16/dist/katex.min.css">
{%- endif %}
