{%- if pagination.total_pages > 1 %}
    <nav class="mt-8 flex justify-center" aria-label="Pagination">
      <ul class="glass-panel pagination inline-flex items-center gap-1 px-3 py-2" data-base-url="{{ pagination.base_url | safe }}">
      {%- for item in pagination.items %}
        {%- if item.number %}
        <li>
          <a
            href="{{ item.url | safe }}"
            class="pagination-link"
            {%- if item.is_current %} aria-current="page"{%- endif %}
          >{{ item.number }}</a>
        </li>
        {%- else %}
        <li>
          <span class="pagination-link pagination-ellipsis pagination-jump" role="button" tabindex="0" title="Jump to page">&hellip;</span>
          <input class="pagination-input" style="display: none" type="number" min="1" max="{{ pagination.total_pages }}" aria-label="Jump to page">
        </li>
        {%- endif %}
      {%- endfor %}
      </ul>
    </nav>

    <script src="{{ config.base_url | safe }}/js/pagination.min.js" defer></script>
{%- endif %}
