<!DOCTYPE html>
<html lang="{{ config.language }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% block title %}<title>{{ config.title }}</title>{% endblock %}
  <link rel="stylesheet" href="{{ config.base_url | safe }}/dist/style.min.css">
  <link rel="stylesheet" href="{{ config.base_url | safe }}/css/syntax.css">
  <script src="{{ config.base_url | safe }}/js/theme.js"></script>
  {% include "_partials/head-deps.html" %}
  {%- block head %}{% endblock %}
</head>

<body
  {%- if config.params.background and config.params.background.image %}
  style="--bg-image: url('{{ config.base_url | safe }}{{ config.params.background.image | safe }}'){% if config.params.background.position %}; --bg-position: {{ config.params.background.position }}{% endif %}{% if config.params.background.position_mobile %}; --bg-position-mobile: {{ config.params.background.position_mobile }}{% endif %}"
  {%- endif %}
>
  {% include "_partials/header.html" %}
  <main class="flex-1 pt-16">
    {%- block body %}{% endblock %}
  </main>
  {% include "_partials/footer.html" %}
  <script src="{{ config.base_url | safe }}/js/code-copy.js" defer></script>
  <script src="{{ config.base_url | safe }}/js/heading-anchor.js" defer></script>
  <script src="{{ config.base_url | safe }}/js/toc.js" defer></script>
  {%- block scripts %}{% endblock %}
</body>
</html>
