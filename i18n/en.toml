# IgnIt theme translations — English
#
# Flat key = value TOML. Keys are referenced from templates via {{ t("key") }},
# with optional Python-style {name} placeholders resolved through t() kwargs.
# en.toml is the fallback for any key missing from another language.
#
# Menu item names from `config.menu.main` are translated via `t(item.name)`;
# add a key per menu entry (or t() falls through to the literal name).

